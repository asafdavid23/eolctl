name: Draft New Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version for the release (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
    contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build
        run: |
          mkdir -p output
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -ldflags="-X 'eolctl/cmd.Version=${{ github.event.inputs.version }}'" -o output/eolctl-${{ matrix.goos }}-${{ matrix.goarch }} .

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: eolctl-${{ matrix.goos }}-${{ matrix.goarch }}
          path: output/

  create_tag:
    runs-on: ubuntu-latest
    needs: build
    outputs:
      changelog: ${{ steps.extract.outputs.content }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Extract changelog content
        id: extract
        run: |
          # Grab everything between ## [Unreleased] and the next --- separator
          CONTENT=$(awk '/^## \[Unreleased\]/{found=1; next} found && /^---/{exit} found{print}' CHANGELOG.md)
          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo "$CONTENT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Update CHANGELOG
        run: |
          VERSION="${{ github.event.inputs.version }}"
          VERSION_CLEAN="${VERSION#v}"
          DATE=$(date +%Y-%m-%d)

          # Replace [Unreleased] header with the versioned header
          sed -i "s/## \[Unreleased\]/## [${VERSION_CLEAN}] - ${DATE}/" CHANGELOG.md

          # Insert a fresh [Unreleased] section above the newly versioned entry
          sed -i "s/## \[${VERSION_CLEAN}\] - ${DATE}/## [Unreleased]\n\n---\n\n## [${VERSION_CLEAN}] - ${DATE}/" CHANGELOG.md

      - name: Commit CHANGELOG
        run: |
          git add CHANGELOG.md
          git commit -m "Update CHANGELOG for ${{ github.event.inputs.version }}"
          git push origin main

      - name: Create Git tag
        run: |
          git tag ${{ github.event.inputs.version }}
          git push origin ${{ github.event.inputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    runs-on: ubuntu-latest
    needs: create_tag

    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
            name: eolctl-${{ matrix.goos }}-${{ matrix.goarch }}
            path: artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.event.inputs.version }}
          tag_name: ${{ github.event.inputs.version }}
          body: ${{ needs.create_tag.outputs.changelog }}
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
